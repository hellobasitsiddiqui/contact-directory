# Two-container production-like stack (CD-024): the app + PostgreSQL with a
# persistent named volume so data survives restarts/redeploys.
#
#   docker compose up --build
#
# Copy .env.example to .env and set real secrets first. The app runs under the
# "postgres" Spring profile (H2 is only for local dev / tests).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-contacts}
      POSTGRES_USER: ${POSTGRES_USER:-contacts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contacts}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contacts} -d ${POSTGRES_DB:-contacts}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Not published by default; the app reaches it over the compose network.

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-contacts}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-contacts}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-contacts}
      # Override these in .env for any real deployment.
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-me-local-dev-secret-please-override-32+bytes}
      APP_DEFAULT_ADMIN_PASSWORD: ${APP_DEFAULT_ADMIN_PASSWORD:-admin123}
    ports:
      - "8080:8080"

volumes:
  pgdata:
