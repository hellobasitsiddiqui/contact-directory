# Two-container stack (CD-024): the app + PostgreSQL with a persistent named
# volume so data survives restarts/redeploys.
#
#   cp .env.example .env    # set a real DB password + APP_JWT_SECRET FIRST
#   docker compose up --build
#
# ⚠️  DEV-ONLY DEFAULTS: the ${VAR:-default} fallbacks below (admin123, the
#     'contacts' DB password, a placeholder JWT secret) exist only so `up` works
#     out-of-the-box for local trials. They are INSECURE — override ALL of them
#     via .env for anything beyond your laptop. The app runs under the "postgres"
#     Spring profile (H2 is dev/test only).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-contacts}
      POSTGRES_USER: ${POSTGRES_USER:-contacts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contacts}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contacts} -d ${POSTGRES_DB:-contacts}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Not published by default; the app reaches it over the compose network.

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-contacts}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-contacts}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-contacts}
      # Override these in .env for any real deployment.
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-me-local-dev-secret-please-override-32+bytes}
      APP_DEFAULT_ADMIN_PASSWORD: ${APP_DEFAULT_ADMIN_PASSWORD:-admin123}
    # Bound to host loopback (not 0.0.0.0): reachable at http://localhost:8080 for
    # local use, but NOT exposed to the network. This matters for the TLS stack
    # (docker-compose.tls.yml) — there the app trusts the proxy's forwarded headers,
    # so only Caddy (80/443) should be internet-facing; Caddy reaches the app over
    # the internal compose network regardless of host publishing.
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  pgdata:
