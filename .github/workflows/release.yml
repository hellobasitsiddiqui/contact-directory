name: Release

# Cut a release from a version tag. Push a tag like `v1.0.0` (after the
# develop -> master release merge) and this builds the JAR, publishes a GitHub
# Release with notes from CHANGELOG.md, and pushes a version-tagged image to GHCR.
# Also runnable manually against an existing tag via workflow_dispatch.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v1.0.0)'
        required: true

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Build, publish release & image
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the GitHub Release
      packages: write        # push the versioned image to GHCR
    steps:
      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="ghcr.io/${{ github.repository }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # A SemVer pre-release has a hyphen (e.g. 1.0.0-beta.1). For those: mark
          # the GitHub Release as a pre-release and DON'T move the :latest image tag
          # (latest should stay on the newest stable build).
          case "$VERSION" in
            *-*)
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
              printf 'image_tags<<EOF\n%s:%s\nEOF\n' "$REPO" "$VERSION" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              printf 'image_tags<<EOF\n%s:%s\n%s:latest\nEOF\n' "$REPO" "$VERSION" "$REPO" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ver.outputs.tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build, test & verify coverage
        run: ./mvnw -B clean verify

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          awk -v v="$VERSION" '
            $0 ~ ("^## \\[" v "\\]") {grab=1; next}
            grab && (/^## \[/ || /^\[.*\]:/) {exit}
            grab {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${{ steps.ver.outputs.tag }}" > release-notes.md
          fi
          echo "----- release notes -----"; cat release-notes.md

      - name: Create or update the GitHub Release with the JAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Idempotent: create the Release if it doesn't exist (tag pushed from CLI),
          # otherwise just attach the JAR to the Release that already exists (created
          # via the GitHub UI). Either way the JAR lands on the release.
          TAG="${{ steps.ver.outputs.tag }}"
          PRERELEASE=""
          [ "${{ steps.ver.outputs.prerelease }}" = "true" ] && PRERELEASE="--prerelease"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            $PRERELEASE \
            target/*.jar \
          || gh release upload "$TAG" target/*.jar --clobber

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push the versioned image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # Stable: :<version> + :latest. Pre-release (1.0.0-beta.1): :<version> only.
          tags: ${{ steps.ver.outputs.image_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
