<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management — Contact Directory</title>
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia
          && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = saved || (prefersDark ? 'dark' : 'light');
        // Auth guard: must be signed in...
        if (!localStorage.getItem('auth_token')) {
          window.location.replace('login.html');
        } else {
          // ...and must be an admin.
          var u = JSON.parse(localStorage.getItem('auth_user') || 'null');
          if (!u || u.role !== 'ADMIN') {
            window.location.replace('index.html');
          }
        }
      } catch (e) {
        document.documentElement.dataset.theme = 'light';
      }
    })();
  </script>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="confirm-dialog.js"></script>
  <script defer src="users.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <h1 class="app-header__title">User Management</h1>
      <div class="app-header__actions">
        <span id="current-user" class="app-header__user" hidden></span>
        <a href="index.html" class="btn btn--secondary">← Contacts</a>
        <a href="activity.html" class="btn btn--secondary">Activity</a>
        <a href="profile.html" class="btn btn--secondary">Profile</a>
        <button type="button" id="btn-logout" class="btn btn--secondary">Log out</button>
      </div>
    </div>
  </header>

  <main class="app-main">
    <p id="users-error" class="login-error" role="alert" hidden></p>

    <section class="toolbar" aria-label="Filters">
      <div class="toolbar__inner">
        <div class="toolbar__controls">
          <div class="toolbar__control">
            <label for="filter-username">Username</label>
            <input type="search" id="filter-username" class="input"
                   placeholder="Search username…" autocomplete="off" spellcheck="false" />
          </div>
          <div class="toolbar__control">
            <label for="filter-role">Role</label>
            <select id="filter-role" class="select">
              <option value="">All roles</option>
              <option value="USER">USER</option>
              <option value="ADMIN">ADMIN</option>
            </select>
          </div>
          <div class="toolbar__control">
            <label for="filter-status">Status</label>
            <select id="filter-status" class="select">
              <option value="">All statuses</option>
              <option value="enabled">Enabled</option>
              <option value="disabled">Disabled</option>
            </select>
          </div>
          <div class="toolbar__control">
            <button type="button" id="btn-clear-filters" class="btn btn--secondary">Clear</button>
          </div>
        </div>
      </div>
    </section>

    <section class="users-stats" id="users-stats" aria-label="User totals" hidden>
      <div class="users-stat">
        <span class="users-stat__value" id="stat-total">0</span>
        <span class="users-stat__label">Total</span>
      </div>
      <div class="users-stat">
        <span class="users-stat__value" id="stat-admins">0</span>
        <span class="users-stat__label">Admins</span>
      </div>
      <div class="users-stat">
        <span class="users-stat__value" id="stat-enabled">0</span>
        <span class="users-stat__label">Enabled</span>
      </div>
      <div class="users-stat">
        <span class="users-stat__value" id="stat-disabled">0</span>
        <span class="users-stat__label">Disabled</span>
      </div>
    </section>

    <div id="bulk-bar" class="bulk-bar" role="region" aria-label="Bulk actions" hidden>
      <span id="bulk-count" class="bulk-bar__count" aria-live="polite"></span>
      <div class="bulk-bar__actions">
        <button type="button" id="btn-bulk-disable" class="btn btn--secondary btn--sm">Disable</button>
        <button type="button" id="btn-bulk-enable" class="btn btn--secondary btn--sm">Enable</button>
        <button type="button" id="btn-bulk-admin" class="btn btn--secondary btn--sm">Make ADMIN</button>
        <button type="button" id="btn-bulk-user" class="btn btn--secondary btn--sm">Make USER</button>
        <button type="button" id="btn-bulk-delete" class="btn btn--danger btn--sm">Delete</button>
        <button type="button" id="btn-bulk-clear" class="btn btn--ghost btn--sm">Clear</button>
      </div>
    </div>

    <section class="users-panel" aria-label="User accounts">
      <div id="users-loading" class="users-status">Loading users…</div>
      <table class="users-table" id="users-table" hidden>
        <thead>
          <tr>
            <th scope="col" class="col-select">
              <input type="checkbox" id="select-all" aria-label="Select all users on this page" />
            </th>
            <th scope="col" aria-sort="none">
              <button type="button" class="users-sort" data-sort="username">
                Username<span class="users-sort__indicator" aria-hidden="true"></span>
              </button>
            </th>
            <th scope="col" aria-sort="none">
              <button type="button" class="users-sort" data-sort="role">
                Role<span class="users-sort__indicator" aria-hidden="true"></span>
              </button>
            </th>
            <th scope="col" aria-sort="none">
              <button type="button" class="users-sort" data-sort="status">
                Status<span class="users-sort__indicator" aria-hidden="true"></span>
              </button>
            </th>
            <th scope="col" aria-sort="none">
              <button type="button" class="users-sort" data-sort="created">
                Created<span class="users-sort__indicator" aria-hidden="true"></span>
              </button>
            </th>
            <th scope="col" class="users-table__actions-col">Actions</th>
          </tr>
        </thead>
        <tbody id="users-body"></tbody>
      </table>
      <div id="users-empty" class="users-status" hidden>No users yet.</div>

      <nav class="pagination" id="users-pagination" aria-label="Users pagination" hidden>
        <div class="pagination__size">
          <label for="page-size">Per page</label>
          <select id="page-size" class="select">
            <option value="10">10</option>
            <option value="25" selected>25</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </div>
        <span id="page-info" class="pagination__info" aria-live="polite"></span>
        <div class="pagination__nav">
          <button type="button" id="btn-prev-page" class="btn btn--secondary btn--sm">Prev</button>
          <button type="button" id="btn-next-page" class="btn btn--secondary btn--sm">Next</button>
        </div>
      </nav>
    </section>
  </main>

  <!-- User detail (read-only) modal: details + recent activity -->
  <dialog id="user-modal" class="modal modal--detail" aria-labelledby="user-modal-title">
    <div class="modal__form">
      <header class="modal__header">
        <h2 id="user-modal-title" class="modal__title">User</h2>
        <button type="button" id="btn-user-modal-close" class="modal__close"
                aria-label="Close">×</button>
      </header>

      <div class="modal__body">
        <dl class="detail__list">
          <div class="detail__row"><dt>Username</dt><dd id="user-modal-username"></dd></div>
          <div class="detail__row"><dt>Role</dt><dd id="user-modal-role"></dd></div>
          <div class="detail__row"><dt>Status</dt><dd id="user-modal-status"></dd></div>
          <div class="detail__row"><dt>Created</dt><dd id="user-modal-created"></dd></div>
        </dl>

        <section class="user-activity" aria-label="Recent activity">
          <h3 class="user-activity__title">Recent activity</h3>
          <div id="user-activity-loading" class="user-activity__status">Loading activity…</div>
          <p id="user-activity-error" class="user-activity__status user-activity__status--error" hidden></p>
          <ul id="user-activity-list" class="user-activity__list" hidden></ul>
          <div id="user-activity-empty" class="user-activity__status" hidden>No recent activity.</div>
        </section>
      </div>

      <footer class="modal__footer">
        <button type="button" id="btn-user-modal-done" class="btn btn--secondary">Close</button>
      </footer>
    </div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
</body>
</html>
