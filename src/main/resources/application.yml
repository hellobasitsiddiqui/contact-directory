server:
  port: 8080

spring:
  datasource:
    # Persistent, file-based H2 (data survives restarts) -> ./data/contacts.mv.db
    url: jdbc:h2:file:./data/contacts
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      # Create the schema on first run, then preserve it across restarts.
      ddl-auto: update
    defer-datasource-initialization: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      # Do not re-run data.sql on every boot (it would duplicate seed rows on a
      # persistent DB). Seed data is loaded only by the in-memory test profile.
      mode: never
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
