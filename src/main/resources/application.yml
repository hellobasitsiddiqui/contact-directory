server:
  port: 8080

spring:
  datasource:
    # Persistent, file-based H2 (data survives restarts) -> ./data/contacts.mv.db
    url: jdbc:h2:file:./data/contacts
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      # Create the schema on first run, then preserve it across restarts.
      ddl-auto: update
    defer-datasource-initialization: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      # Do not re-run data.sql on every boot (it would duplicate seed rows on a
      # persistent DB). Seed data is loaded only by the in-memory test profile.
      mode: never
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        # Expose health (public probes), info and metrics over HTTP. Other
        # actuator endpoints stay disabled. Metrics access is gated by Spring
        # Security in SecurityConfig (authenticated only).
        include: health,info,metrics
  endpoint:
    health:
      # Show component/disk/db detail to authenticated callers only; anonymous
      # probes still get the top-level UP/DOWN status.
      show-details: when-authorized
  info:
    # Surface the static info.* properties below via /actuator/info.
    env:
      enabled: true

# Static metadata served by /actuator/info (no build-info plugin wired, so this
# gives the endpoint a meaningful body instead of an empty {}).
info:
  app:
    name: contacts
    description: Contacts management API

app:
  jwt:
    # HS256 signing secret (>= 32 bytes). Override via APP_JWT_SECRET in any real
    # environment; this default is for local/dev use only.
    secret: ${APP_JWT_SECRET:change-me-local-dev-secret-please-override-32+bytes}
    # Token lifetime in milliseconds (default 24h).
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  default-admin:
    # Seeded on first run when no users exist. Change before deploying.
    username: ${APP_DEFAULT_ADMIN_USERNAME:admin}
    password: ${APP_DEFAULT_ADMIN_PASSWORD:admin123}
  security:
    # Brute-force login protection: lock an account after this many consecutive
    # failed logins, for this many minutes. A successful login resets the counter.
    max-login-attempts: ${APP_MAX_LOGIN_ATTEMPTS:5}
    lockout-minutes: ${APP_LOCKOUT_MINUTES:15}
