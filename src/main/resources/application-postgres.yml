# Production persistence profile (CD-024): PostgreSQL + Flyway.
# Activate with SPRING_PROFILES_ACTIVE=postgres. Overrides the H2 datasource from
# application.yml. Hibernate only VALIDATES the schema here — Flyway owns it.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/contacts}
    username: ${SPRING_DATASOURCE_USERNAME:contacts}
    password: ${SPRING_DATASOURCE_PASSWORD:contacts}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate must only check entities match it.
      ddl-auto: validate
    # Must be false with Flyway — `true` (inherited from the base profile for
    # data.sql) creates a circular flyway <-> entityManagerFactory dependency.
    defer-datasource-initialization: false
    # (Dialect is auto-detected from the Postgres connection — no need to set it.)
  sql:
    init:
      # No data.sql; DataInitializer seeds in Java on first run.
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
  # H2 console is meaningless here.
  h2:
    console:
      enabled: false
