# Test profile: isolated, in-memory H2 recreated for every test context, seeded
# from data.sql. This shadows the main application.yml during tests so the
# persistent file database is never touched (or locked) by the test suite.
spring:
  datasource:
    url: jdbc:h2:mem:contacts-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    open-in-view: false
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

# Fixed test secret/lifetime so JWT beans wire and tokens are deterministic.
app:
  jwt:
    secret: test-only-jwt-signing-secret-at-least-32-bytes-long-1234567890
    expiration-ms: 3600000
  default-admin:
    username: admin
    password: admin123
  security:
    # Safe for the existing suite: tests never fail the same account 5+ times in
    # a row and always reset via successful logins, so nobody gets locked out.
    max-login-attempts: 5
    lockout-minutes: 15
