# Test profile: isolated, in-memory H2 recreated for every test context, seeded
# from data.sql. This shadows the main application.yml during tests so the
# persistent file database is never touched (or locked) by the test suite.
spring:
  datasource:
    url: jdbc:h2:mem:contacts-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    open-in-view: false
  sql:
    init:
      mode: always
  flyway:
    # Tests run on in-memory H2 with ddl-auto=create-drop; Flyway (Postgres
    # migrations) must stay off here even though it's on the classpath.
    enabled: false
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

# Mirror the main profile's actuator exposure so the security/probe tests
# exercise the real health (public) vs metrics (authenticated) behaviour.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# Mirror the main profile's info.* metadata so the /actuator/info test sees a
# non-empty body matching production.
info:
  app:
    name: contacts
    description: Contacts management API

# Fixed test secret/lifetime so JWT beans wire and tokens are deterministic.
app:
  jwt:
    secret: test-only-jwt-signing-secret-at-least-32-bytes-long-1234567890
    expiration-ms: 3600000
  default-admin:
    username: admin
    password: admin123
  security:
    # Safe for the existing suite: tests never fail the same account 5+ times in
    # a row and always reset via successful logins, so nobody gets locked out.
    max-login-attempts: 5
    lockout-minutes: 15
