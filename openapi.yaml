openapi: 3.0.1
info:
  title: Contact Directory API
  description: REST API for managing contacts in the Contact Directory.
  version: "1.0"
servers:
- url: http://localhost:8080
  description: Generated server url
tags:
- name: Contacts
  description: "Create, read, update, delete and search contacts"
paths:
  /api/v1/contacts/{id}:
    get:
      tags:
      - Contacts
      summary: Get a contact by id
      operationId: get
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "404":
          description: Contact not found
        "200":
          description: Contact found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
    put:
      tags:
      - Contacts
      summary: Replace a contact
      description: Performs a full update of the contact with the given id.
      operationId: update
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
        required: true
      responses:
        "400":
          description: Validation failed
        "404":
          description: Contact not found
        "200":
          description: Contact updated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "409":
          description: Email already exists
    delete:
      tags:
      - Contacts
      summary: Delete a contact
      operationId: delete
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Contact deleted
        "404":
          description: Contact not found
    patch:
      tags:
      - Contacts
      summary: Partially update a contact
      description: Updates only the supplied (non-null) fields of the contact.
      operationId: patch
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactPatchRequest"
        required: true
      responses:
        "400":
          description: Validation failed
        "404":
          description: Contact not found
        "200":
          description: Contact updated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "409":
          description: Email already exists
  /api/v1/contacts:
    get:
      tags:
      - Contacts
      summary: List contacts
      description: "Returns a paginated list of contacts, optionally filtered by a\
        \ search term."
      operationId: list
      parameters:
      - name: search
        in: query
        description: "Free-text search across first name, last name, email and company"
        required: false
        schema:
          type: string
      - name: page
        in: query
        description: Zero-based page index (0..N)
        required: false
        schema:
          minimum: 0
          type: integer
          default: 0
      - name: size
        in: query
        description: The size of the page to be returned
        required: false
        schema:
          minimum: 1
          type: integer
          default: 20
      - name: sort
        in: query
        description: "Sorting criteria in the format: property,(asc|desc). Default\
          \ sort order is ascending. Multiple sort criteria are supported."
        required: false
        schema:
          type: array
          items:
            type: string
          default:
          - "lastName,ASC"
      responses:
        "200":
          description: Page of contacts
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageContactResponse"
    post:
      tags:
      - Contacts
      summary: Create a contact
      description: Creates a new contact and returns it with a Location header.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
        required: true
      responses:
        "400":
          description: Validation failed
        "201":
          description: Contact created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "409":
          description: Email already exists
  /api/v1/contacts/{id}/photo:
    get:
      tags:
      - Contacts
      summary: Get a contact's photo
      description: Returns the contact's photo bytes with the stored content type.
      operationId: getPhoto
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Photo found
          content:
            '*/*':
              schema:
                type: string
                format: byte
        "404":
          description: Contact or photo not found
    post:
      tags:
      - Contacts
      summary: Upload a contact's photo
      description: "Uploads an image (PNG, JPEG, GIF or WEBP, max 2MB) as the contact's\
        \ photo."
      operationId: uploadPhoto
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
              - file
              type: object
              properties:
                file:
                  type: string
                  description: Image file to upload
                  format: binary
      responses:
        "413":
          description: File too large
        "400":
          description: Invalid image
        "404":
          description: Contact not found
        "200":
          description: Photo uploaded
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
    delete:
      tags:
      - Contacts
      summary: Delete a contact's photo
      operationId: deletePhoto
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "404":
          description: Contact not found
        "204":
          description: Photo deleted
components:
  schemas:
    ContactRequest:
      required:
      - email
      - firstName
      - lastName
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          pattern: "^[+0-9 ()\\-]{7,20}$"
          type: string
        company:
          type: string
    ContactResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        photoUrl:
          type: string
    ContactPatchRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
    PageContactResponse:
      type: object
      properties:
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        numberOfElements:
          type: integer
          format: int32
        first:
          type: boolean
        last:
          type: boolean
        pageable:
          $ref: "#/components/schemas/PageableObject"
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/ContactResponse"
        number:
          type: integer
          format: int32
        sort:
          type: array
          items:
            $ref: "#/components/schemas/SortObject"
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        unpaged:
          type: boolean
        paged:
          type: boolean
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        offset:
          type: integer
          format: int64
        sort:
          type: array
          items:
            $ref: "#/components/schemas/SortObject"
    SortObject:
      type: object
      properties:
        direction:
          type: string
        nullHandling:
          type: string
        ascending:
          type: boolean
        property:
          type: string
        ignoreCase:
          type: boolean
