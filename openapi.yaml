openapi: 3.0.1
info:
  title: Contact Directory API
  description: REST API for managing contacts in the Contact Directory. Most endpoints
    require a JWT bearer token obtained from POST /api/v1/auth/login or /api/v1/auth/register.
  version: "1.0"
servers:
- url: http://localhost:8080
  description: Generated server url
security:
- bearerAuth: []
tags:
- name: User management
  description: Admin-only management of user accounts
- name: Contacts
  description: "Create, read, update, delete and search contacts"
- name: Audit log
  description: Admin-only read access to the audit log
- name: Authentication
  description: "Register, login and current-user endpoints"
paths:
  /api/v1/contacts/{id}:
    get:
      tags:
      - Contacts
      summary: Get a contact by id
      operationId: get
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "404":
          description: Contact not found
        "200":
          description: Contact found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
    put:
      tags:
      - Contacts
      summary: Replace a contact
      description: Performs a full update of the contact with the given id.
      operationId: update
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
        required: true
      responses:
        "400":
          description: Validation failed
        "404":
          description: Contact not found
        "409":
          description: Email already exists
        "412":
          description: Stale version / concurrent modification
        "200":
          description: Contact updated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
    delete:
      tags:
      - Contacts
      summary: Soft-delete a contact
      description: Soft-deletes the contact (moves it to trash); it can be restored
        or permanently deleted later.
      operationId: delete_1
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Contact moved to trash
        "404":
          description: Contact not found
    patch:
      tags:
      - Contacts
      summary: Partially update a contact
      description: Updates only the supplied (non-null) fields of the contact.
      operationId: patch
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactPatchRequest"
        required: true
      responses:
        "400":
          description: Validation failed
        "404":
          description: Contact not found
        "409":
          description: Email already exists
        "412":
          description: Stale version / concurrent modification
        "200":
          description: Contact updated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
  /api/v1/users/{id}/reset-password:
    post:
      tags:
      - User management
      summary: Reset a user's password
      operationId: resetPassword
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
  /api/v1/contacts:
    get:
      tags:
      - Contacts
      summary: List contacts
      description: "Returns a paginated list of contacts, optionally filtered by a\
        \ search term and/or a tag."
      operationId: list_1
      parameters:
      - name: search
        in: query
        description: "Free-text search across first name, last name, email, company\
          \ and phone"
        required: false
        schema:
          type: string
      - name: tag
        in: query
        description: Restrict results to contacts carrying this tag (case-insensitive)
        required: false
        schema:
          type: string
      - name: page
        in: query
        description: Zero-based page index (0..N)
        required: false
        schema:
          minimum: 0
          type: integer
          default: 0
      - name: size
        in: query
        description: The size of the page to be returned
        required: false
        schema:
          minimum: 1
          type: integer
          default: 20
      - name: sort
        in: query
        description: "Sorting criteria in the format: property,(asc|desc). Default\
          \ sort order is ascending. Multiple sort criteria are supported."
        required: false
        schema:
          type: array
          items:
            type: string
          default:
          - "lastName,ASC"
      responses:
        "200":
          description: Page of contacts
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageContactResponse"
    post:
      tags:
      - Contacts
      summary: Create a contact
      description: Creates a new contact and returns it with a Location header.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
        required: true
      responses:
        "400":
          description: Validation failed
        "409":
          description: Email already exists
        "201":
          description: Contact created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
  /api/v1/contacts/{id}/restore:
    post:
      tags:
      - Contacts
      summary: Restore a trashed contact
      description: "Restores a soft-deleted contact, returning it to the active list."
      operationId: restore
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "404":
          description: Contact not found
        "200":
          description: Contact restored
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
  /api/v1/contacts/{id}/photo:
    get:
      tags:
      - Contacts
      summary: Get a contact's photo
      description: Returns the contact's photo bytes with the stored content type.
      operationId: getPhoto
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Photo found
          content:
            '*/*':
              schema:
                type: string
                format: byte
        "404":
          description: Contact or photo not found
    post:
      tags:
      - Contacts
      summary: Upload a contact's photo
      description: "Uploads an image (PNG, JPEG, GIF or WEBP, max 2MB) as the contact's\
        \ photo."
      operationId: uploadPhoto
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
              - file
              type: object
              properties:
                file:
                  type: string
                  description: Image file to upload
                  format: binary
      responses:
        "413":
          description: File too large
        "404":
          description: Contact not found
        "400":
          description: Invalid image
        "200":
          description: Photo uploaded
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
    delete:
      tags:
      - Contacts
      summary: Delete a contact's photo
      operationId: deletePhoto
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "404":
          description: Contact not found
        "204":
          description: Photo deleted
  /api/v1/contacts/import:
    post:
      tags:
      - Contacts
      summary: Import contacts from a CSV file
      description: "Uploads a CSV (optional header row) and creates contacts, skipping\
        \ rows whose email already exists."
      operationId: importCsv
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
              - file
              type: object
              properties:
                file:
                  type: string
                  description: CSV file to import
                  format: binary
      responses:
        "200":
          description: Import summary
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ImportSummary"
        "413":
          description: File too large
        "400":
          description: Invalid file
  /api/v1/contacts/bulk/tags:
    post:
      tags:
      - Contacts
      summary: Bulk add/remove tags on contacts
      description: "Adds and/or removes tags across the supplied contacts, skipping\
        \ missing or already-deleted ids."
      operationId: bulkTags
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkTagsRequest"
        required: true
      responses:
        "200":
          description: Bulk tags result
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BulkResult"
  /api/v1/contacts/bulk/favorite:
    post:
      tags:
      - Contacts
      summary: Bulk set favorite on contacts
      description: "Sets the favorite flag on the supplied contacts, skipping missing\
        \ or already-deleted ids."
      operationId: bulkFavorite
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkFavoriteRequest"
        required: true
      responses:
        "200":
          description: Bulk favorite result
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BulkResult"
  /api/v1/contacts/bulk/delete:
    post:
      tags:
      - Contacts
      summary: Bulk soft-delete contacts
      description: "Soft-deletes the supplied contacts, skipping missing or already-deleted\
        \ ids."
      operationId: bulkDelete
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkIdsRequest"
        required: true
      responses:
        "200":
          description: Bulk delete result
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BulkResult"
  /api/v1/auth/register:
    post:
      tags:
      - Authentication
      summary: Register a new account and receive a JWT
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v1/auth/login:
    post:
      tags:
      - Authentication
      summary: Log in with username/password and receive a JWT
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v1/auth/change-password:
    post:
      tags:
      - Authentication
      summary: Change the current user's own password
      operationId: changePassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: string
  /api/v1/users/{id}/role:
    patch:
      tags:
      - User management
      summary: Change a user's role
      operationId: updateRole
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
  /api/v1/users/{id}/enabled:
    patch:
      tags:
      - User management
      summary: Enable or disable a user account
      operationId: setEnabled
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEnabledRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
  /api/v1/users:
    get:
      tags:
      - User management
      summary: List all user accounts
      operationId: list
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
  /api/v1/contacts/trash:
    get:
      tags:
      - Contacts
      summary: List trashed contacts
      description: Returns a paginated list of soft-deleted contacts.
      operationId: listTrash
      parameters:
      - name: page
        in: query
        description: Zero-based page index (0..N)
        required: false
        schema:
          minimum: 0
          type: integer
          default: 0
      - name: size
        in: query
        description: The size of the page to be returned
        required: false
        schema:
          minimum: 1
          type: integer
          default: 20
      - name: sort
        in: query
        description: "Sorting criteria in the format: property,(asc|desc). Default\
          \ sort order is ascending. Multiple sort criteria are supported."
        required: false
        schema:
          type: array
          items:
            type: string
          default:
          - "deletedAt,ASC"
      responses:
        "200":
          description: Page of trashed contacts
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageContactResponse"
  /api/v1/contacts/tags:
    get:
      tags:
      - Contacts
      summary: List all tags in use
      description: "Returns the distinct, sorted set of tags assigned to any contact."
      operationId: listTags
      responses:
        "200":
          description: List of tags
          content:
            '*/*':
              schema:
                type: array
                items:
                  type: string
  /api/v1/contacts/export.json:
    get:
      tags:
      - Contacts
      summary: Export all contacts as JSON
      operationId: exportJson
      responses:
        "200":
          description: JSON array of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactResponse"
  /api/v1/contacts/export.csv:
    get:
      tags:
      - Contacts
      summary: Export all contacts as CSV
      operationId: exportCsv
      responses:
        "200":
          description: CSV document
          content:
            text/csv:
              schema:
                type: string
                format: byte
  /api/v1/auth/me:
    get:
      tags:
      - Authentication
      summary: Return the currently authenticated user
      operationId: me
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: object
  /api/v1/audit:
    get:
      tags:
      - Audit log
      summary: List audit events
      description: "Returns a paginated, newest-first list of audit events, optionally\
        \ filtered by actor and/or action."
      operationId: list_2
      parameters:
      - name: actor
        in: query
        description: Restrict events to those performed by this actor
        required: false
        schema:
          type: string
      - name: action
        in: query
        description: Restrict events to this action (AuditAction enum name)
        required: false
        schema:
          type: string
          enum:
          - CONTACT_CREATE
          - CONTACT_UPDATE
          - CONTACT_DELETE
          - CONTACT_RESTORE
          - CONTACT_PURGE
          - CONTACT_BULK_DELETE
          - CONTACT_BULK_FAVORITE
          - CONTACT_BULK_TAGS
          - CONTACT_IMPORT
          - CONTACT_PHOTO_UPDATE
          - CONTACT_PHOTO_DELETE
          - USER_ROLE_CHANGE
          - USER_ENABLED_CHANGE
          - USER_PASSWORD_RESET
          - USER_DELETE
          - AUTH_REGISTER
          - AUTH_LOGIN
          - AUTH_PASSWORD_CHANGE
      - name: page
        in: query
        description: Zero-based page index (0..N)
        required: false
        schema:
          minimum: 0
          type: integer
          default: 0
      - name: size
        in: query
        description: The size of the page to be returned
        required: false
        schema:
          minimum: 1
          type: integer
          default: 20
      - name: sort
        in: query
        description: "Sorting criteria in the format: property,(asc|desc). Default\
          \ sort order is ascending. Multiple sort criteria are supported."
        required: false
        schema:
          type: array
          items:
            type: string
          default:
          - "timestamp,DESC"
      responses:
        "200":
          description: Page of audit events
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageAuditEventResponse"
  /api/v1/users/{id}:
    delete:
      tags:
      - User management
      summary: Delete a user account
      operationId: delete
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
  /api/v1/contacts/{id}/permanent:
    delete:
      tags:
      - Contacts
      summary: Permanently delete a contact (admin only)
      description: "Hard-deletes the contact, removing it irreversibly. Requires the\
        \ ADMIN role."
      operationId: purge
      parameters:
      - name: id
        in: path
        description: Contact identifier
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "403":
          description: Caller is not an admin
        "404":
          description: Contact not found
        "204":
          description: Contact permanently deleted
components:
  schemas:
    ContactRequest:
      required:
      - email
      - firstName
      - lastName
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          pattern: "^[+0-9 ()\\-]{7,20}$"
          type: string
        company:
          type: string
        tags:
          uniqueItems: true
          type: array
          items:
            type: string
        favorite:
          type: boolean
        notes:
          type: string
        version:
          type: integer
          format: int64
    ContactResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        photoUrl:
          type: string
        tags:
          uniqueItems: true
          type: array
          items:
            type: string
        favorite:
          type: boolean
        notes:
          type: string
        deletedAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
    ResetPasswordRequest:
      required:
      - password
      type: object
      properties:
        password:
          maxLength: 100
          minLength: 6
          type: string
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        role:
          type: string
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
    ImportSummary:
      type: object
      properties:
        imported:
          type: integer
          format: int32
        skipped:
          type: integer
          format: int32
        errors:
          type: array
          items:
            type: string
    BulkTagsRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
            format: int64
        addTags:
          uniqueItems: true
          type: array
          items:
            type: string
        removeTags:
          uniqueItems: true
          type: array
          items:
            type: string
    BulkResult:
      type: object
      properties:
        affected:
          type: integer
          format: int32
    BulkFavoriteRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
            format: int64
        favorite:
          type: boolean
    BulkIdsRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
            format: int64
    RegisterRequest:
      required:
      - password
      - username
      type: object
      properties:
        username:
          maxLength: 50
          minLength: 3
          type: string
        password:
          maxLength: 100
          minLength: 6
          type: string
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        tokenType:
          type: string
        username:
          type: string
        role:
          type: string
        expiresInMs:
          type: integer
          format: int64
    LoginRequest:
      required:
      - password
      - username
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    ChangePasswordRequest:
      required:
      - currentPassword
      - newPassword
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          maxLength: 100
          minLength: 6
          type: string
    UpdateRoleRequest:
      required:
      - role
      type: object
      properties:
        role:
          type: string
          enum:
          - USER
          - ADMIN
    UpdateEnabledRequest:
      required:
      - enabled
      type: object
      properties:
        enabled:
          type: boolean
    ContactPatchRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        tags:
          uniqueItems: true
          type: array
          items:
            type: string
        favorite:
          type: boolean
        notes:
          type: string
        version:
          type: integer
          format: int64
    PageContactResponse:
      type: object
      properties:
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        numberOfElements:
          type: integer
          format: int32
        first:
          type: boolean
        last:
          type: boolean
        pageable:
          $ref: "#/components/schemas/PageableObject"
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/ContactResponse"
        number:
          type: integer
          format: int32
        sort:
          type: array
          items:
            $ref: "#/components/schemas/SortObject"
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        paged:
          type: boolean
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        unpaged:
          type: boolean
        offset:
          type: integer
          format: int64
        sort:
          type: array
          items:
            $ref: "#/components/schemas/SortObject"
    SortObject:
      type: object
      properties:
        direction:
          type: string
        nullHandling:
          type: string
        ascending:
          type: boolean
        property:
          type: string
        ignoreCase:
          type: boolean
    AuditEventResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time
        actor:
          type: string
        action:
          type: string
        targetType:
          type: string
        targetId:
          type: integer
          format: int64
        summary:
          type: string
    PageAuditEventResponse:
      type: object
      properties:
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        numberOfElements:
          type: integer
          format: int32
        first:
          type: boolean
        last:
          type: boolean
        pageable:
          $ref: "#/components/schemas/PageableObject"
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/AuditEventResponse"
        number:
          type: integer
          format: int32
        sort:
          type: array
          items:
            $ref: "#/components/schemas/SortObject"
        empty:
          type: boolean
  securitySchemes:
    bearerAuth:
      type: http
      description: Paste a JWT from /api/v1/auth/login (the 'Bearer ' prefix is added
        automatically).
      scheme: bearer
      bearerFormat: JWT
